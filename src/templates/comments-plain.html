<div class="row">
    <div class="col-12">
        <h2 class="h3 bolded-blue" data-i18n="litw-comment-title"></h2>
        <span class="text-left" data-i18n="litw-comment-subtitle"></span>
    </div>
</div>

<form id="commentsForm" style="text-align: left">

    <!-- General comments -->
    <div class="mb-3">
        <label class="form-label" data-i18n="litw-comment-q1"></label>
        <textarea class="form-control" name="comment-general" rows="3"></textarea>
    </div>

    <!-- Did you encounter technical difficulties? -->
    <div class="mb-3">
        <label class="form-label" data-i18n="litw-comment-q21"></label>
        <select class="form-select" name="comment-hadissue" id="comment-hadissue">
            <option value="">--</option>
            <option value="no" data-i18n="litw-demographics-no"></option>
            <option value="yes" data-i18n="litw-demographics-yes"></option>
        </select>
    </div>

    <!-- Specify the issue (conditional: shown when hadissue=yes) -->
    <div class="mb-3" id="comment-issue-group" style="display:none">
        <label class="form-label" data-i18n="litw-comment-q22"></label>
        <textarea class="form-control" name="comment-issue" rows="3"></textarea>
    </div>

    <!-- Should researchers exclude your data? -->
    <div class="mb-3">
        <label class="form-label" data-i18n="litw-comment-q31"></label>
        <select class="form-select" name="comment-shouldexclude" id="comment-shouldexclude">
            <option value="">--</option>
            <option value="no" data-i18n="litw-demographics-no"></option>
            <option value="yes" data-i18n="litw-demographics-yes"></option>
        </select>
    </div>

    <!-- Specify why to exclude (conditional: shown when shouldexclude=yes) -->
    <div class="mb-3" id="comment-whyexclude-group" style="display:none">
        <label class="form-label" data-i18n="litw-comment-q32"></label>
        <textarea class="form-control" name="comment-whyexclude" rows="3"></textarea>
    </div>

    <!-- Email info -->
    <div class="mb-3">
        <span data-i18n="litw-comment-email-p1"></span>
        <a href="mailto:info@labinthewild.org" data-i18n="litw-comment-email-p2"></a>
    </div>

</form>

<script type="text/javascript">
    function getFormData() {
        let data = {};
        let form = document.getElementById('commentsForm');
        new FormData(form).forEach((value, key) => {
            if (key in data) {
                if (!Array.isArray(data[key])) data[key] = [data[key]];
                data[key].push(value);
            } else {
                data[key] = value;
            }
        });
        return data;
    }

    $(document).ready(function() {
        // Show/hide issue textarea when hadissue = yes
        $('#comment-hadissue').on('change', function() {
            $('#comment-issue-group').toggle(this.value === 'yes');
        });

        // Show/hide whyexclude textarea when shouldexclude = yes
        $('#comment-shouldexclude').on('change', function() {
            $('#comment-whyexclude-group').toggle(this.value === 'yes');
        });

        // Apply i18n
        $('#commentsForm').i18n();
    });
</script>
